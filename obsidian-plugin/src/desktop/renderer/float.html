<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0; padding: 0; overflow: hidden;
      width: 100%; height: 100%;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-app-region: drag;
    }
    .mn-float-panel {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px; width: 100%; height: 100%;
      box-sizing: border-box; padding: 4px;
      background: #1e1e1e;
      border-radius: 12px;
    }
    .mn-float-btn {
      width: 50px; height: 50px;
      border: none; border-radius: 8px;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: background 0.12s;
      -webkit-app-region: no-drag;
    }
    .mn-float-btn svg {
      width: 28px; height: 28px;
    }
    .mn-float-btn--stop {
      background: #dc2626;
    }
    .mn-float-btn--stop:hover {
      background: #b91c1c;
    }
    .mn-float-btn--stop svg {
      fill: #ffffff; stroke: none;
    }
    .mn-float-btn--nav {
      background: rgba(255,255,255,0.08);
    }
    .mn-float-btn--nav:hover {
      background: rgba(255,255,255,0.15);
    }
    .mn-float-btn--nav svg {
      stroke: #c0c0c0; fill: none;
      stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
    }
    .mn-float-btn--nav:hover svg {
      stroke: #ffffff;
    }
  </style>
</head>
<body>
  <div class="mn-float-panel">
    <button class="mn-float-btn mn-float-btn--stop" id="btn-stop" title="Stop recording">
      <svg viewBox="2 2 14 14"><rect x="4" y="4" width="10" height="10" rx="2"></rect></svg>
    </button>
    <button class="mn-float-btn mn-float-btn--nav" id="btn-nav" title="Return to app">
      <svg viewBox="1 2 15 14"><path d="M6 9L3 12l3 3M3 12h7a4 4 0 0 0 0-8H7"></path></svg>
    </button>
  </div>
  <script>
    document.getElementById("btn-stop").addEventListener("click", function() {
      window.api.floatStop();
    });
    document.getElementById("btn-nav").addEventListener("click", function() {
      window.api.floatNavigate();
    });
  </script>
</body>
</html>
