<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    html, body {
      margin: 0; padding: 0; overflow: hidden;
      width: 100%; height: 100%;
      background: #1e1e1e;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .mn-float-panel {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; width: 100%; height: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      box-sizing: border-box;
    }
    .mn-float-btn {
      width: 40px; height: 40px;
      border: none; border-radius: 8px;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: opacity 0.15s ease;
    }
    .mn-float-btn:hover { opacity: 0.85; }
    .mn-float-btn--stop {
      background: #dc2626;
    }
    .mn-float-btn--nav {
      background: rgba(255,255,255,0.08);
    }
    .mn-float-btn svg {
      width: 18px; height: 18px;
      stroke: #ffffff; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .mn-float-btn--stop svg {
      fill: #ffffff; stroke: none;
    }
  </style>
</head>
<body>
  <div class="mn-float-panel">
    <button class="mn-float-btn mn-float-btn--stop" id="btn-stop" title="Stop recording">
      <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg>
    </button>
    <button class="mn-float-btn mn-float-btn--nav" id="btn-nav" title="Return to app">
      <svg viewBox="0 0 24 24"><path d="M6 9L3 12l3 3M3 12h7a4 4 0 0 0 0-8H7"></path></svg>
    </button>
  </div>
  <script>
    document.getElementById("btn-stop").addEventListener("click", function() {
      window.api.floatStop();
    });
    document.getElementById("btn-nav").addEventListener("click", function() {
      window.api.floatNavigate();
    });
  </script>
</body>
</html>
