<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Meeting Notes</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/thin/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Title Bar -->
  <header class="title-bar">
    <div class="title-bar__drag">
      <i class="ph-thin ph-microphone title-bar__icon"></i>
      <h1 class="title-bar__title">AI Meeting Notes</h1>
      <span class="title-bar__version">v0.1.0</span>
    </div>
    <div class="title-bar__controls">
      <button id="btn-minimize" class="title-bar__ctrl" title="Minimize">
        <i class="ph ph-minus"></i>
      </button>
      <button id="btn-close" class="title-bar__ctrl title-bar__ctrl--close" title="Close">
        <i class="ph ph-x"></i>
      </button>
    </div>
  </header>

  <!-- Action Row -->
  <div class="action-row">
    <select id="engine-select" class="action-row__select">
      <option value="cloud">Cloud</option>
      <option value="local">Local</option>
      <option value="auto">Auto</option>
    </select>
    <select id="meeting-type-select" class="action-row__select">
      <option value="Meeting Notes">Meeting Notes</option>
    </select>
    <button id="btn-start" class="action-row__btn action-row__btn--start">Start Recording</button>
    <button id="btn-stop" class="action-row__btn action-row__btn--stop" disabled>Stop</button>
    <button id="btn-settings" class="action-row__btn action-row__btn--settings" title="Settings">
      <i class="ph ph-sliders-horizontal"></i>
    </button>
  </div>

  <!-- Consent Row -->
  <div class="consent-row">
    <label class="consent-row__label">
      <input type="checkbox" id="consent-check" class="consent-row__check">
      <span>I confirm all participants have been informed this meeting will be recorded</span>
    </label>
  </div>

  <!-- Session List -->
  <div class="session-list" id="session-list">
    <div class="session-list__empty" id="session-empty">No sessions yet. Start a recording.</div>
  </div>

  <!-- Live Transcript Preview -->
  <div class="transcript-preview" id="transcript-preview" hidden>
    <div class="transcript-preview__header">Live Transcript</div>
    <div class="transcript-preview__body" id="transcript-body"></div>
  </div>

  <!-- Status Bar -->
  <footer class="status-bar">
    <span id="status-text" class="status-bar__text">Ready</span>
    <span id="status-privacy" class="status-bar__privacy"></span>
  </footer>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settings-overlay">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title">Settings</h2>
        <button class="modal__close" id="btn-settings-close"><i class="ph ph-x"></i></button>
      </div>
      <div class="modal__body">
        <div class="form-group">
          <label for="setting-api-key">AssemblyAI API Key</label>
          <input type="password" id="setting-api-key" class="form-input" placeholder="Enter API key...">
        </div>
        <div class="form-group">
          <label for="setting-output-dir">Output Directory</label>
          <div class="form-row">
            <input type="text" id="setting-output-dir" class="form-input form-input--wide" placeholder="Default: current directory">
            <button id="btn-browse-output" class="form-btn-sm">Browse</button>
          </div>
        </div>
        <div class="form-group">
          <label for="setting-timestamps">Timestamp Mode</label>
          <select id="setting-timestamps" class="form-input">
            <option value="elapsed">Elapsed (00:05:00)</option>
            <option value="local_time">Local Time (14:30:00)</option>
            <option value="none">None</option>
          </select>
        </div>
        <div class="form-group">
          <label for="setting-endpointing">Endpointing</label>
          <select id="setting-endpointing" class="form-input">
            <option value="conservative">Conservative (recommended)</option>
            <option value="balanced">Balanced</option>
            <option value="aggressive">Aggressive</option>
            <option value="very_conservative">Very Conservative</option>
          </select>
        </div>
        <div class="form-group">
          <label for="setting-model-size">Local Model</label>
          <select id="setting-model-size" class="form-input">
            <option value="tiny.en">Tiny — fastest, basic quality (~75 MB)</option>
            <option value="base.en">Base — fast, decent quality (~145 MB)</option>
            <option value="distil-small.en">Distil Small — fast, good quality (~166 MB)</option>
            <option value="small.en">Small — balanced (recommended, ~244 MB)</option>
            <option value="distil-large-v3">Distil Large v3 — best quality + speed (~756 MB)</option>
            <option value="medium.en">Medium — high accuracy, slow (~769 MB)</option>
          </select>
        </div>
        <hr class="form-divider">
        <h3 class="form-section-title">Recording</h3>
        <div class="form-group">
          <label class="form-checkbox-label">
            <input type="checkbox" id="setting-record-wav" class="form-checkbox">
            Save WAV recording (~1.9 MB/min)
          </label>
        </div>
        <div class="form-group">
          <label class="form-checkbox-label">
            <input type="checkbox" id="setting-speaker-labels" class="form-checkbox">
            Enable speaker labels (cloud only)
          </label>
        </div>
        <div class="form-group">
          <label class="form-checkbox-label">
            <input type="checkbox" id="setting-open-editor" class="form-checkbox">
            Open editor for notes on recording start
          </label>
        </div>
        <hr class="form-divider">
        <h3 class="form-section-title">Silence Detection</h3>
        <div class="form-group">
          <label for="setting-silence-threshold">Silence threshold (seconds)</label>
          <input type="range" id="setting-silence-threshold" class="form-range" min="5" max="60" value="15">
          <span id="silence-threshold-value" class="form-range-value">15s</span>
        </div>
        <div class="form-group">
          <label class="form-checkbox-label">
            <input type="checkbox" id="setting-silence-auto-stop" class="form-checkbox">
            Auto-stop recording after 120s of silence
          </label>
        </div>
        <hr class="form-divider">
        <h3 class="form-section-title">Floating Indicator</h3>
        <div class="form-group">
          <label for="setting-indicator-position">Position when Obsidian/app loses focus</label>
          <select id="setting-indicator-position" class="form-select">
            <option value="top-right">Top Right</option>
            <option value="center-right">Center Right</option>
            <option value="bottom-left">Bottom Left</option>
          </select>
        </div>
        <hr class="form-divider">
        <h3 class="form-section-title">Meeting Types</h3>
        <div class="form-group">
          <div id="meeting-types-list" class="meeting-types-list"></div>
          <div class="form-row">
            <input type="text" id="new-meeting-type" class="form-input form-input--wide" placeholder="Add new type...">
            <button id="btn-add-type" class="form-btn-sm">Add</button>
          </div>
        </div>
      </div>
      <div class="modal__footer">
        <button id="btn-settings-save" class="form-btn">Save</button>
        <button id="btn-settings-cancel" class="form-btn form-btn--secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Merge Dialog -->
  <div class="modal-overlay" id="merge-overlay">
    <div class="modal modal--small">
      <div class="modal__header">
        <h2 class="modal__title">Merge Notes</h2>
      </div>
      <div class="modal__body">
        <p>Please save your notes file in your editor, then click Merge to combine notes with the transcript.</p>
        <p class="merge-dialog__hint" id="merge-notes-path"></p>
      </div>
      <div class="modal__footer">
        <button id="btn-merge" class="form-btn">Merge</button>
        <button id="btn-skip-merge" class="form-btn form-btn--secondary">Skip</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="settings.js"></script>
  <script src="app.js"></script>
</body>
</html>
